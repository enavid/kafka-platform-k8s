# ==============================================================================
# Schema Registry — Confluent Community Edition
# Image: confluentinc/cp-schema-registry:8.0.0
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-schema-registry
  namespace: kafka-platform
  labels:
    app: kafka-schema-registry
    component: kafka-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-schema-registry
  template:
    metadata:
      labels:
        app: kafka-schema-registry
        component: kafka-platform
    spec:
      volumes:
        - name: kafka-jks
          secret:
            secretName: kafka-client-jks
      containers:
        - name: kafka-schema-registry
          image: confluentinc/cp-schema-registry:8.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: 256Mi
              cpu: "0.25"
            limits:
              memory: 512Mi
              cpu: "0.5"
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: "kafka-schema-registry"
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "kafka-platform-kafka-bootstrap.kafka-platform.svc.cluster.local:9092"
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"

            # SSL to Kafka
            - name: SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL
              value: "SSL"
            - name: SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_LOCATION
              value: "/etc/kafka/secrets/kafka.client.truststore.jks"
            - name: SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-jks-password
                  key: password
            - name: SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_LOCATION
              value: "/etc/kafka/secrets/kafka.client.keystore.jks"
            - name: SCHEMA_REGISTRY_KAFKASTORE_SSL_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-jks-password
                  key: password
            - name: SCHEMA_REGISTRY_KAFKASTORE_SSL_KEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-jks-password
                  key: password
            - name: SCHEMA_REGISTRY_KAFKASTORE_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM
              value: ""
          volumeMounts:
            - name: kafka-jks
              mountPath: /etc/kafka/secrets
              readOnly: true
          livenessProbe:
            httpGet:
              path: /subjects
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /subjects
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
