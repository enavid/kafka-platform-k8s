# ==============================================================================
# Strimzi Kafka Cluster — KRaft Mode
# Replaces: confluentinc/cp-server in docker-compose
#
# Prerequisites:
#   helm repo add strimzi https://strimzi.io/charts/
#   helm install strimzi-operator strimzi/strimzi-kafka-operator \
#     --namespace kafka-platform \
#     --set watchNamespaces="{kafka-platform}"
# ==============================================================================
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka
  namespace: kafka-platform
  labels:
    strimzi.io/cluster: kafka-platform
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: 50Gi
    deleteClaim: false
  resources:
    requests:
      memory: 1Gi
      cpu: "1"
    limits:
      memory: 2Gi
      cpu: "2"
  jvmOptions:
    -Xms: 1024m
    -Xmx: 1024m
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-platform
  namespace: kafka-platform
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    metadataVersion: "4.2"

    listeners:
      # Internal listener — used by Schema Registry, Connect, REST Proxy, kafka-ui
      - name: tls
        port: 9092
        type: internal
        tls: true
        authentication:
          type: tls
      # External listener — optional, for external clients
      - name: external
        port: 9093
        type: nodeport
        tls: true
        authentication:
          type: tls

    config:
      # Replication
      default.replication.factor: 1
      min.insync.replicas: 1
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1

      # Performance
      num.network.threads: 3
      num.io.threads: 8
      socket.send.buffer.bytes: 102400
      socket.receive.buffer.bytes: 102400
      socket.request.max.bytes: 104857600

      # Log retention
      log.retention.hours: 168
      log.retention.bytes: "1073741824"
      log.segment.bytes: "1073741824"
      log.retention.check.interval.ms: 300000

      # Topic settings
      auto.create.topics.enable: "true"
      compression.type: producer
      num.partitions: 1
      num.recovery.threads.per.data.dir: 1

    authorization:
      type: simple
      superUsers:
        - User:admin

    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics-config
          key: kafka-metrics-config.yml

  entityOperator:
    topicOperator: {}
    userOperator: {}

  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
---
# ==============================================================================
# Kafka Admin User
# Used by Schema Registry, Connect, REST Proxy, kafka-ui
# ==============================================================================
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: admin
  namespace: kafka-platform
  labels:
    strimzi.io/cluster: kafka-platform
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations:
          - All
      - resource:
          type: group
          name: "*"
          patternType: literal
        operations:
          - All
      - resource:
          type: cluster
        operations:
          - All
      - resource:
          type: transactionalId
          name: "*"
          patternType: literal
        operations:
          - All
---
# ==============================================================================
# Kafka Connect Internal Topics
# ==============================================================================
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: docker-connect-configs
  namespace: kafka-platform
  labels:
    strimzi.io/cluster: kafka-platform
spec:
  partitions: 1
  replicas: 1
  config:
    cleanup.policy: compact
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: docker-connect-offsets
  namespace: kafka-platform
  labels:
    strimzi.io/cluster: kafka-platform
spec:
  partitions: 25
  replicas: 1
  config:
    cleanup.policy: compact
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: docker-connect-status
  namespace: kafka-platform
  labels:
    strimzi.io/cluster: kafka-platform
spec:
  partitions: 5
  replicas: 1
  config:
    cleanup.policy: compact
---
# ==============================================================================
# Kafka Metrics ConfigMap — JMX Prometheus Exporter
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics-config
  namespace: kafka-platform
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    rules:
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          topic: "$4"
          partition: "$5"
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          broker: "$4:$5"
      - pattern: kafka.server<type=(.+), name=(.+)><>(\w+)
        name: kafka_server_$1_$2_$3
        type: GAUGE
      - pattern: kafka.(\w+)<type=(.+), name=(.+)><>(\w+)
        name: kafka_$1_$2_$3_$4
        type: GAUGE
