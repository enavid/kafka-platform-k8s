# ==============================================================================
# Apache Flink — JobManager
# Image: cnfldemos/flink-kafka:1.19.1-scala_2.12-java17
# Replaces: flink-jobmanager service in docker-compose
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: kafka-platform
  labels:
    app: flink-jobmanager
    component: kafka-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-jobmanager
  template:
    metadata:
      labels:
        app: flink-jobmanager
        component: kafka-platform
    spec:
      containers:
        - name: flink-jobmanager
          image: cnfldemos/flink-kafka:1.19.1-scala_2.12-java17
          imagePullPolicy: IfNotPresent
          args: ["jobmanager"]
          ports:
            - containerPort: 6123
              name: rpc
            - containerPort: 9081
              name: ui
          resources:
            requests:
              memory: 512Mi
              cpu: "0.1"
            limits:
              memory: 1Gi
              cpu: "0.5"
          env:
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
                rest.bind-port: 9081
                jobmanager.memory.process.size: 1600m
                parallelism.default: 1
          livenessProbe:
            httpGet:
              path: /overview
              port: 9081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /overview
              port: 9081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: kafka-platform
  labels:
    app: flink-jobmanager
    component: kafka-platform
spec:
  selector:
    app: flink-jobmanager
  ports:
    - name: rpc
      port: 6123
      targetPort: 6123
    - name: ui
      port: 9081
      targetPort: 9081
  type: ClusterIP
---
# ==============================================================================
# Apache Flink — TaskManager
# Image: cnfldemos/flink-kafka:1.19.1-scala_2.12-java17
# Replaces: flink-taskmanager service in docker-compose
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: kafka-platform
  labels:
    app: flink-taskmanager
    component: kafka-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-taskmanager
  template:
    metadata:
      labels:
        app: flink-taskmanager
        component: kafka-platform
    spec:
      containers:
        - name: flink-taskmanager
          image: cnfldemos/flink-kafka:1.19.1-scala_2.12-java17
          imagePullPolicy: IfNotPresent
          args: ["taskmanager"]
          resources:
            requests:
              memory: 512Mi
              cpu: "0.1"
            limits:
              memory: 1Gi
              cpu: "1.0"
          env:
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
                taskmanager.numberOfTaskSlots: 10
                taskmanager.memory.process.size: 1728m
---
# ==============================================================================
# Apache Flink — SQL Client
# Replaces: flink-sql-client service in docker-compose
# Attach with: kubectl exec -it deploy/flink-sql-client -n kafka-platform -- ./bin/sql-client.sh
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-sql-client
  namespace: kafka-platform
  labels:
    app: flink-sql-client
    component: kafka-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-sql-client
  template:
    metadata:
      labels:
        app: flink-sql-client
        component: kafka-platform
    spec:
      containers:
        - name: flink-sql-client
          image: cnfldemos/flink-sql-client-kafka:1.19.1-scala_2.12-java17
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "sleep infinity"]
          resources:
            requests:
              memory: 256Mi
              cpu: "0.1"
            limits:
              memory: 512Mi
              cpu: "0.5"
          env:
            - name: FLINK_JOBMANAGER_HOST
              value: "flink-jobmanager"