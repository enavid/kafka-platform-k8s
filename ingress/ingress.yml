# ==============================================================================
# Ingress — nginx-ingress controller
# Replaces: nginx containers in both docker-compose files
#
# Prerequisites:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm install ingress-nginx ingress-nginx/ingress-nginx \
#     --namespace ingress-nginx --create-namespace
#
# TLS Secret:
#   kubectl create secret tls kafka-platform-tls \
#     --cert=./certs/fullchain.pem \
#     --key=./certs/privkey.pem \
#     --namespace kafka-platform
#
# DNS A records required (all → Ingress EXTERNAL-IP):
#   kafka-ui.yourdomain.com
#   flink.yourdomain.com
#   schema-registry.yourdomain.com
#   kafka-connect.yourdomain.com
#   rest-proxy.yourdomain.com
#   nifi.yourdomain.com
# ==============================================================================

# ------------------------------------------------------------------------------
# Kafka UI — no basic auth (has its own LOGIN_FORM)
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-kafka-ui
  namespace: kafka-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kafka-ui.yourdomain.com
      secretName: kafka-platform-tls
  rules:
    - host: kafka-ui.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
---
# ------------------------------------------------------------------------------
# NiFi — no basic auth (has its own single-user login)
# NiFi runs HTTPS internally, so backend-protocol: HTTPS is required
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-nifi
  namespace: kafka-platform
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nifi.yourdomain.com
      secretName: kafka-platform-tls
  rules:
    - host: nifi.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nifi
                port:
                  number: 8443
---
# ------------------------------------------------------------------------------
# Protected services — Flink, Schema Registry, Connect, REST Proxy
# Basic auth via htpasswd
# ------------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-protected
  namespace: kafka-platform
  annotations:
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: kafka-platform-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Kafka Platform"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - flink.yourdomain.com
        - schema-registry.yourdomain.com
        - kafka-connect.yourdomain.com
        - rest-proxy.yourdomain.com
      secretName: kafka-platform-tls
  rules:
    - host: flink.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flink-jobmanager
                port:
                  number: 9081

    - host: schema-registry.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-schema-registry
                port:
                  number: 8081

    - host: kafka-connect.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-connect-svc
                port:
                  number: 8083

    - host: rest-proxy.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kafka-rest-proxy
                port:
                  number: 8082
