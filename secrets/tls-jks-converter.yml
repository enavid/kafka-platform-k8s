# ==============================================================================
# Secret Sync — Copy Strimzi TLS Secrets for External Services
#
# Strimzi auto-generates TLS secrets:
#   kafka-platform-cluster-ca-cert  — CA certificate
#   admin                           — admin user client cert/key
#
# This Job converts them to JKS format for Confluent components
# (Schema Registry, Connect, REST Proxy) that require JKS.
#
# Run after: kubectl apply -f strimzi/kafka-cluster.yml
# Wait for:  kubectl get secret admin -n kafka-platform
# ==============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: tls-jks-converter
  namespace: kafka-platform
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: cluster-ca
          secret:
            secretName: kafka-platform-cluster-ca-cert
        - name: admin-cert
          secret:
            secretName: admin
        - name: jks-output
          emptyDir: {}
      initContainers:
        - name: convert
          image: eclipse-temurin:17-jdk-alpine
          command:
            - /bin/sh
            - -c
            - |
              set -e
              PASS="${JKS_PASSWORD}"

              # ---- truststore: cluster CA ----
              cp /ca/ca.crt /tmp/ca.crt
              keytool -importcert \
                -alias kafka-ca \
                -file /tmp/ca.crt \
                -keystore /jks/kafka.client.truststore.jks \
                -storepass "${PASS}" \
                -noprompt

              # ---- keystore: admin client cert ----
              openssl pkcs12 -export \
                -in /admin/user.crt \
                -inkey /admin/user.key \
                -name admin \
                -passout pass:"${PASS}" \
                -out /tmp/admin.p12

              keytool -importkeystore \
                -srckeystore /tmp/admin.p12 \
                -srcstoretype PKCS12 \
                -srcstorepass "${PASS}" \
                -destkeystore /jks/kafka.client.keystore.jks \
                -deststoretype JKS \
                -deststorepass "${PASS}" \
                -noprompt

              echo "JKS files created successfully"
              ls -lh /jks/
          env:
            - name: JKS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-jks-password
                  key: password
          volumeMounts:
            - name: cluster-ca
              mountPath: /ca
            - name: admin-cert
              mountPath: /admin
            - name: jks-output
              mountPath: /jks
      containers:
        - name: store-secret
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              kubectl create secret generic kafka-client-jks \
                --from-file=kafka.client.truststore.jks=/jks/kafka.client.truststore.jks \
                --from-file=kafka.client.keystore.jks=/jks/kafka.client.keystore.jks \
                --namespace kafka-platform \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "Secret kafka-client-jks created/updated"
          volumeMounts:
            - name: jks-output
              mountPath: /jks
      serviceAccountName: jks-converter-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jks-converter-sa
  namespace: kafka-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jks-converter-role
  namespace: kafka-platform
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jks-converter-rolebinding
  namespace: kafka-platform
subjects:
  - kind: ServiceAccount
    name: jks-converter-sa
    namespace: kafka-platform
roleRef:
  kind: Role
  name: jks-converter-role
  apiGroup: rbac.authorization.k8s.io
